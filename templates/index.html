<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARLUX EMD — SOP 格式檢查系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #9A7A2E;
    --black: #0A0A0A;
    --dark: #111215;
    --panel: #181A1E;
    --panel2: #1F2228;
    --border: #2A2D35;
    --text: #E8E8E8;
    --text-dim: #8A8D96;
    --text-muted: #555A66;
    --error: #E05555;
    --error-bg: #2A1515;
    --warning: #D4A72C;
    --warning-bg: #251E0A;
    --success: #4CAF82;
    --success-bg: #0D2018;
    --info: #5B9BD5;
    --info-bg: #0D1A2A;
    --fixed: #3A4A3A;
    --skipped: #2A2A35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Inter', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  .header-title { font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }
  .header-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 2px; }
  .header-badge {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--dark);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  .filter-group { padding: 12px 20px 8px; }
  .filter-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 6px; }
  .filter-btn {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--gold-dark); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.06); }
  .filter-count {
    background: var(--panel2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
  }
  .filter-btn.active .filter-count { background: var(--gold-dark); color: var(--black); }

  .issue-list-sidebar {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .issue-list-sidebar::-webkit-scrollbar { width: 4px; }
  .issue-list-sidebar::-webkit-scrollbar-track { background: transparent; }
  .issue-list-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.03); }
  .sidebar-item.selected { background: rgba(201,168,76,0.06); border-left-color: var(--gold); }
  .sidebar-item.status-fixed { opacity: 0.4; }
  .sidebar-item.status-skip { opacity: 0.35; }

  .sidebar-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .severity-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-error { background: var(--error); }
  .dot-warning { background: var(--warning); }
  .dot-info { background: var(--info); }

  .sidebar-item-cat { font-size: 11px; font-weight: 500; flex: 1; }
  .sidebar-item-loc { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Upload Screen ── */
  .upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    gap: 40px;
  }
  .upload-logo {
    text-align: center;
  }
  .upload-logo-mark {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    margin: 0 auto 16px;
  }
  .upload-logo h1 { font-size: 24px; font-weight: 600; letter-spacing: 0.06em; }
  .upload-logo p { font-size: 13px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.04em; }

  .upload-zone {
    width: 100%;
    max-width: 520px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--dark);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.04);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon {
    width: 48px; height: 48px; margin: 0 auto 16px;
    color: var(--gold);
    opacity: 0.7;
  }
  .upload-text { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .upload-hint { font-size: 12px; color: var(--text-dim); }
  .upload-format { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  .upload-progress {
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 16px 0;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text { font-size: 13px; color: var(--text-dim); }

  /* ── Toolbar ── */
  .toolbar {
    padding: 14px 24px;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .toolbar-info {
    flex: 1;
    min-width: 200px;
  }
  .toolbar-filename { font-size: 13px; font-weight: 500; }
  .toolbar-counts { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--black);
  }
  .btn-gold:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover:not(:disabled) { border-color: var(--gold-dark); color: var(--text); }
  .btn-ghost {
    background: none;
    border: none;
    color: var(--text-dim);
  }
  .btn-ghost:hover:not(:disabled) { color: var(--text); }
  .btn-danger {
    background: none;
    border: 1px solid var(--error);
    color: var(--error);
  }
  .btn-danger:hover:not(:disabled) { background: var(--error-bg); }

  .btn-download-group { position: relative; }
  .download-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 50;
    min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .download-menu.open { display: block; }
  .download-menu-item {
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }
  .download-menu-item:hover { background: var(--panel2); }

  /* ── Issue Cards ── */
  .issues-container {
    flex: 1;
    padding: 20px 24px;
  }

  .issue-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .issue-card:hover { border-color: #3A3D47; }
  .issue-card.selected { border-color: var(--gold-dark); box-shadow: 0 0 0 1px var(--gold-dark); }
  .issue-card.status-fixed {
    opacity: 0.5;
    background: var(--fixed);
    border-color: #3A4A3A;
  }
  .issue-card.status-skip {
    opacity: 0.4;
    background: var(--skipped);
  }

  .issue-card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .issue-checkbox {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .issue-card.selected .issue-checkbox {
    background: var(--gold);
    border-color: var(--gold);
  }

  .severity-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .badge-error { background: var(--error-bg); color: var(--error); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-info { background: var(--info-bg); color: var(--info); }

  .issue-cat { font-size: 13px; font-weight: 500; flex: 1; }
  .issue-loc { font-size: 11px; color: var(--text-muted); }

  .auto-fix-tag {
    background: rgba(76,175,130,0.15);
    color: var(--success);
    border: 1px solid rgba(76,175,130,0.3);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .manual-tag {
    background: rgba(91,155,213,0.1);
    color: var(--info);
    border: 1px solid rgba(91,155,213,0.2);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    flex-shrink: 0;
  }
  .fixed-tag {
    background: var(--success-bg);
    color: var(--success);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    flex-shrink: 0;
  }
  .skipped-tag {
    background: var(--panel2);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    flex-shrink: 0;
  }

  .chevron {
    transition: transform 0.2s;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .issue-card.expanded .chevron { transform: rotate(180deg); }

  .issue-card-body {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .issue-card.expanded .issue-card-body { display: block; }

  .issue-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    white-space: pre-wrap;
    padding: 12px 0 8px;
  }

  .issue-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Summary bar ── */
  .summary-bar {
    display: flex;
    gap: 20px;
    padding: 0 24px 16px;
    flex-wrap: wrap;
  }
  .summary-stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .stat-num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-label { color: var(--text-dim); font-size: 11px; }

  /* ── Empty State ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    padding: 60px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* ── All clear ── */
  .all-clear {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px;
    text-align: center;
  }
  .all-clear-icon {
    width: 64px; height: 64px;
    background: var(--success-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .all-clear h3 { font-size: 18px; font-weight: 600; color: var(--success); }
  .all-clear p { font-size: 13px; color: var(--text-dim); }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    max-width: 320px;
    animation: slideIn 0.2s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--error); }
  .toast.warning { border-color: var(--warning); }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Scrollbar ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 4px 20px; }

  /* ── Select all bar ── */
  .select-bar {
    padding: 8px 24px;
    background: rgba(201,168,76,0.06);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--gold);
  }

  /* Screen states */
  #upload-screen { display: flex; }
  #result-screen { display: none; flex-direction: column; height: 100%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark"></div>
    <div>
      <div class="header-title">STARLUX Airlines</div>
      <div class="header-sub">Engineering & Maintenance Division</div>
    </div>
  </div>
  <div class="header-badge">SOP 格式檢查系統</div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">問題清單</div>
    </div>

    <div class="filter-group">
      <div class="filter-label">篩選</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
        全部 <span class="filter-count" id="fc-all">0</span>
      </button>
      <button class="filter-btn" data-filter="error" onclick="setFilter('error')">
        ❌ 錯誤 <span class="filter-count" id="fc-error">0</span>
      </button>
      <button class="filter-btn" data-filter="warning" onclick="setFilter('warning')">
        ⚠️ 警告 <span class="filter-count" id="fc-warning">0</span>
      </button>
      <button class="filter-btn" data-filter="auto_fixable" onclick="setFilter('auto_fixable')">
        ✨ 可自動修改 <span class="filter-count" id="fc-auto">0</span>
      </button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">
        ⏳ 待處理 <span class="filter-count" id="fc-pending">0</span>
      </button>
    </div>
    <div class="divider"></div>
    <div class="issue-list-sidebar" id="sidebar-list"></div>
  </div>

  <!-- Main -->
  <div class="main" id="main-panel">

    <!-- Upload Screen -->
    <div id="upload-screen" class="upload-screen">
      <div class="upload-logo">
        <div class="upload-logo-mark"></div>
        <h1>SOP 格式檢查系統</h1>
        <p>依照 SOP-EMD-22-101 Rev.05 自動驗證文件格式</p>
      </div>

      <div class="upload-zone" id="upload-zone"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)">
        <input type="file" id="file-input" accept=".docx" onchange="handleFileSelect(event)">
        <svg class="upload-icon" viewBox="0 0 48 48" fill="none">
          <rect x="8" y="6" width="32" height="36" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M16 16h16M16 22h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M30 34l4-4 4 4M34 30v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="upload-text">點擊上傳或拖曳檔案至此</div>
        <div class="upload-hint">上傳 SOP Word 文件進行格式檢查</div>
        <div class="upload-format">支援格式：.docx</div>
      </div>

      <div class="upload-progress" id="upload-progress" style="display:none">
        <div class="progress-text" id="progress-text">正在分析文件…</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-info">
          <div class="toolbar-filename" id="tb-filename">—</div>
          <div class="toolbar-counts" id="tb-counts">—</div>
        </div>
        <button class="btn btn-outline" onclick="fixSelected()" id="btn-fix-selected" disabled>
          ✨ 修改選取項目
        </button>
        <button class="btn btn-gold" onclick="fixAll()" id="btn-fix-all">
          ⚡ 全部自動修改
        </button>
        <div class="btn-download-group">
          <button class="btn btn-outline" onclick="toggleDownloadMenu()">
            ⬇ 下載 ▾
          </button>
          <div class="download-menu" id="download-menu">
            <div class="download-menu-item" onclick="downloadFile('docx')">
              📄 下載 Word 檔案（.docx）
            </div>
            <div class="download-menu-item" onclick="downloadFile('pdf')">
              📕 下載 PDF 檔案（.pdf）
            </div>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="resetApp()" title="重新上傳">
          🔄 重新上傳
        </button>
      </div>

      <!-- Summary -->
      <div class="summary-bar" id="summary-bar"></div>

      <!-- Issues container -->
      <div class="issues-container" id="issues-container"></div>
    </div>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
let sessionId = null;
let allIssues = [];
let selectedIds = new Set();
let currentFilter = 'all';
let uploadedFilename = '';

// ── Upload ──────────────────────────────────────────────────────────────────

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('dragover');
}
function handleDragLeave(e) {
  document.getElementById('upload-zone').classList.remove('dragover');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) uploadFile(file);
}

async function uploadFile(file) {
  if (!file.name.endsWith('.docx')) {
    showToast('請上傳 .docx 格式的 Word 文件', 'error');
    return;
  }
  uploadedFilename = file.name;
  const fd = new FormData();
  fd.append('file', file);

  // Show progress
  document.getElementById('upload-progress').style.display = 'block';
  animateProgress();

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '上傳失敗');

    sessionId = data.session_id;
    allIssues = data.issues;
    showResults(file.name);
  } catch(err) {
    showToast('分析失敗：' + err.message, 'error');
    document.getElementById('upload-progress').style.display = 'none';
    resetProgressBar();
  }
}

let progressInterval = null;
function animateProgress() {
  let pct = 0;
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-text');
  const msgs = ['正在讀取文件…', '檢查文件編號及封面…', '驗證格式規範…', '分析字體字號…', '檢查章節完整性…', '整理分析報告…'];
  let msgIdx = 0;
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    pct = Math.min(pct + Math.random() * 8 + 2, 92);
    bar.style.width = pct + '%';
    if (pct > msgIdx * 16 && msgIdx < msgs.length) {
      txt.textContent = msgs[msgIdx++];
    }
  }, 200);
}
function resetProgressBar() {
  clearInterval(progressInterval);
  document.getElementById('progress-bar').style.width = '0%';
}

// ── Results ──────────────────────────────────────────────────────────────────

function showResults(filename) {
  clearInterval(progressInterval);
  document.getElementById('progress-bar').style.width = '100%';

  setTimeout(() => {
    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('tb-filename').textContent = filename;
    renderAll();
    showToast(`分析完成，共發現 ${allIssues.length} 個問題`, allIssues.length === 0 ? 'success' : 'warning');
  }, 400);
}

function renderAll() {
  renderSidebar();
  renderIssueCards();
  renderSummary();
  updateToolbar();
  updateFilterCounts();
}

function getFilteredIssues() {
  return allIssues.filter(issue => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'error') return issue.severity === 'error' && issue.user_action !== 'fixed' && issue.user_action !== 'skip';
    if (currentFilter === 'warning') return issue.severity === 'warning' && issue.user_action !== 'fixed' && issue.user_action !== 'skip';
    if (currentFilter === 'auto_fixable') return issue.auto_fixable && issue.user_action !== 'fixed';
    if (currentFilter === 'pending') return !issue.user_action;
    return true;
  });
}

function renderSidebar() {
  const filtered = getFilteredIssues();
  const list = document.getElementById('sidebar-list');
  if (filtered.length === 0 && allIssues.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">尚未上傳文件</div>';
    return;
  }
  list.innerHTML = allIssues.map(issue => {
    const isSelected = selectedIds.has(issue.id);
    const dotClass = issue.severity === 'error' ? 'dot-error' : issue.severity === 'warning' ? 'dot-warning' : 'dot-info';
    const statusClass = issue.user_action === 'fixed' ? 'status-fixed' : issue.user_action === 'skip' ? 'status-skip' : '';
    const show = currentFilter === 'all' ||
      (currentFilter === 'error' && issue.severity === 'error' && !issue.user_action) ||
      (currentFilter === 'warning' && issue.severity === 'warning' && !issue.user_action) ||
      (currentFilter === 'auto_fixable' && issue.auto_fixable && issue.user_action !== 'fixed') ||
      (currentFilter === 'pending' && !issue.user_action);
    return `<div class="sidebar-item ${isSelected ? 'selected' : ''} ${statusClass}"
                 style="${!show ? 'display:none' : ''}"
                 onclick="scrollToIssue(${issue.id})">
      <div class="sidebar-item-header">
        <div class="severity-dot ${dotClass}"></div>
        <div class="sidebar-item-cat">${issue.category}</div>
        ${issue.user_action === 'fixed' ? '<span style="font-size:10px;color:var(--success)">✓</span>' : ''}
        ${issue.user_action === 'skip' ? '<span style="font-size:10px;color:var(--text-muted)">–</span>' : ''}
      </div>
      <div class="sidebar-item-loc">${issue.location}</div>
    </div>`;
  }).join('');
}

function renderSummary() {
  const errors = allIssues.filter(i => i.severity === 'error' && i.user_action !== 'fixed').length;
  const warnings = allIssues.filter(i => i.severity === 'warning' && i.user_action !== 'fixed').length;
  const fixed = allIssues.filter(i => i.user_action === 'fixed').length;
  const autoFixable = allIssues.filter(i => i.auto_fixable && i.user_action !== 'fixed').length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-stat">
      <div><div class="stat-num" style="color:var(--error)">${errors}</div><div class="stat-label">錯誤</div></div>
    </div>
    <div class="summary-stat">
      <div><div class="stat-num" style="color:var(--warning)">${warnings}</div><div class="stat-label">警告</div></div>
    </div>
    <div class="summary-stat">
      <div><div class="stat-num" style="color:var(--success)">${fixed}</div><div class="stat-label">已修改</div></div>
    </div>
    <div class="summary-stat">
      <div><div class="stat-num" style="color:var(--gold)">${autoFixable}</div><div class="stat-label">可自動修改</div></div>
    </div>
  `;
}

function renderIssueCards() {
  const container = document.getElementById('issues-container');
  const filtered = getFilteredIssues();

  if (allIssues.length === 0) {
    container.innerHTML = `
      <div class="all-clear">
        <div class="all-clear-icon">✅</div>
        <h3>格式檢查通過</h3>
        <p>文件格式符合 SOP-EMD-22-101 所有可驗證規範</p>
      </div>`;
    return;
  }
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>此篩選條件下沒有問題</p>
      </div>`;
    return;
  }

  container.innerHTML = allIssues.map(issue => {
    const hidden = !filtered.includes(issue);
    const isSelected = selectedIds.has(issue.id);
    const sevBadge = issue.severity === 'error'
      ? '<span class="severity-badge badge-error">錯誤</span>'
      : issue.severity === 'warning'
      ? '<span class="severity-badge badge-warning">警告</span>'
      : '<span class="severity-badge badge-info">提示</span>';

    let statusTag = '';
    if (issue.user_action === 'fixed') statusTag = '<span class="fixed-tag">✓ 已修改</span>';
    else if (issue.user_action === 'skip') statusTag = '<span class="skipped-tag">跳過</span>';
    else if (issue.auto_fixable) statusTag = '<span class="auto-fix-tag">✨ 可自動修改</span>';
    else statusTag = '<span class="manual-tag">需手動修改</span>';

    const actionButtons = issue.user_action === 'fixed' || issue.user_action === 'skip'
      ? `<button class="btn btn-ghost" onclick="undoAction(${issue.id})">↩ 復原</button>`
      : `
        ${issue.auto_fixable ? `<button class="btn btn-gold" style="font-size:11px;padding:5px 12px" onclick="fixSingle(${issue.id})">✨ 自動修改</button>` : ''}
        <button class="btn btn-outline" style="font-size:11px;padding:5px 12px" onclick="skipIssue(${issue.id})">跳過此項</button>
      `;

    const statusClass = issue.user_action === 'fixed' ? 'status-fixed' : issue.user_action === 'skip' ? 'status-skip' : '';

    return `
      <div class="issue-card ${isSelected ? 'selected' : ''} ${statusClass}"
           id="issue-${issue.id}"
           style="${hidden ? 'display:none' : ''}">
        <div class="issue-card-header" onclick="toggleCard(${issue.id}, event)">
          <div class="issue-checkbox" onclick="toggleSelect(${issue.id}, event)">
            ${isSelected ? '<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L4 7L9 1" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>' : ''}
          </div>
          ${sevBadge}
          <div class="issue-cat">${issue.category}</div>
          <div class="issue-loc">${issue.location}</div>
          ${statusTag}
          <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="issue-card-body">
          <div class="issue-desc">${escHtml(issue.description)}</div>
          <div class="issue-actions">
            ${actionButtons}
          </div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(id, e) {
  if (e.target.closest('.issue-checkbox') || e.target.closest('.btn')) return;
  const card = document.getElementById('issue-' + id);
  card.classList.toggle('expanded');
}

function toggleSelect(id, e) {
  e.stopPropagation();
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderAll();
}

function scrollToIssue(id) {
  const el = document.getElementById('issue-' + id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('selected');
    // Expand it
    el.classList.add('expanded');
    // Sidebar highlight
    selectedIds.add(id);
    renderSidebar();
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderIssueCards();
  renderSidebar();
}

function updateFilterCounts() {
  document.getElementById('fc-all').textContent = allIssues.length;
  document.getElementById('fc-error').textContent = allIssues.filter(i => i.severity === 'error' && !i.user_action).length;
  document.getElementById('fc-warning').textContent = allIssues.filter(i => i.severity === 'warning' && !i.user_action).length;
  document.getElementById('fc-auto').textContent = allIssues.filter(i => i.auto_fixable && i.user_action !== 'fixed').length;
  document.getElementById('fc-pending').textContent = allIssues.filter(i => !i.user_action).length;
}

function updateToolbar() {
  const pending = allIssues.filter(i => !i.user_action).length;
  const auto = allIssues.filter(i => i.auto_fixable && i.user_action !== 'fixed').length;
  const selAuto = allIssues.filter(i => selectedIds.has(i.id) && i.auto_fixable && i.user_action !== 'fixed').length;

  document.getElementById('tb-counts').textContent =
    `共 ${allIssues.length} 個問題 · ${pending} 待處理 · ${auto} 可自動修改`;
  document.getElementById('btn-fix-all').disabled = auto === 0;
  document.getElementById('btn-fix-selected').disabled = selAuto === 0;
}

// ── Fix Actions ──────────────────────────────────────────────────────────────

async function fixSingle(id) {
  await applyFixes([id]);
}

async function fixSelected() {
  const ids = [...selectedIds].filter(id => {
    const issue = allIssues.find(i => i.id === id);
    return issue && issue.auto_fixable && issue.user_action !== 'fixed';
  });
  if (ids.length === 0) { showToast('選取項目中沒有可自動修改的問題', 'warning'); return; }
  await applyFixes(ids);
}

async function fixAll() {
  const ids = allIssues.filter(i => i.auto_fixable && i.user_action !== 'fixed').map(i => i.id);
  if (ids.length === 0) { showToast('沒有可自動修改的問題', 'warning'); return; }
  await applyFixes(ids);
}

async function applyFixes(ids) {
  showToast('正在修改文件…', 'info');
  try {
    const res = await fetch('/api/apply_fixes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_id: sessionId, fix_ids: ids })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    allIssues = data.issues;
    selectedIds.clear();
    renderAll();
    showToast(`已修改 ${data.fixed_count} 個問題`, 'success');
  } catch(err) {
    showToast('修改失敗：' + err.message, 'error');
  }
}

async function skipIssue(id) {
  try {
    await fetch('/api/skip_issue', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_id: sessionId, issue_id: id })
    });
    const issue = allIssues.find(i => i.id === id);
    if (issue) issue.user_action = 'skip';
    renderAll();
  } catch(err) {
    showToast('操作失敗', 'error');
  }
}

function undoAction(id) {
  const issue = allIssues.find(i => i.id === id);
  if (issue) { issue.user_action = null; renderAll(); }
}

// ── Download ─────────────────────────────────────────────────────────────────

function toggleDownloadMenu() {
  document.getElementById('download-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.btn-download-group')) {
    document.getElementById('download-menu').classList.remove('open');
  }
});

function downloadFile(format) {
  if (!sessionId) return;
  document.getElementById('download-menu').classList.remove('open');
  showToast(format === 'pdf' ? '正在轉換 PDF…' : '準備下載…', 'info');
  window.location.href = `/api/download/${sessionId}/${format}`;
}

// ── Reset ─────────────────────────────────────────────────────────────────────

function resetApp() {
  sessionId = null;
  allIssues = [];
  selectedIds.clear();
  currentFilter = 'all';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('upload-progress').style.display = 'none';
  document.getElementById('file-input').value = '';
  resetProgressBar();
  renderSidebar();
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const icon = {success:'✅', error:'❌', warning:'⚠️', info:'ℹ️'}[type] || 'ℹ️';
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────

renderSidebar();
</script>
</body>
</html>
